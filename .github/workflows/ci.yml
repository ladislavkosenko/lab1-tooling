name: CI Pipeline

# Запускати конвеєр при пуші або створенні Pull Request у гілку main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Віртуальна машина на Linux

    steps:
    # 1. Отримання коду з репозиторію
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Встановлення потрібної версії Go
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.x'
        cache: false

    # 3. Перевірка цілісності залежностей
    - name: Verify Dependencies
      run: go mod verify

    # 4. Запуск лінтера (офіційний action)
    - name: Lint
      uses: golangci/golangci-lint-action@v4
      with:
        version: latest
        args: --timeout=5m

    # 5. Запуск тестів через наш Makefile
    - name: Test
      run: make test